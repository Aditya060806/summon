name: Release

# Runs when a version tag (e.g. v1.2.0) is pushed. It always creates a GitHub
# Release from the changelog, and optionally publishes to npm.
#
# To enable automatic npm publishing:
#   1. Create an npm *Automation* access token (bypasses 2FA).
#   2. Add it as the repository secret NPM_TOKEN.
#   3. Add a repository variable AUTO_PUBLISH with the value: true
#      (Settings → Secrets and variables → Actions → Variables)
#
# Without AUTO_PUBLISH=true the publish step is skipped, so the workflow stays
# green and you can keep publishing manually with `npm publish`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create GitHub releases
  id-token: write # enables npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm install || { echo "install failed, retrying clean"; rm -rf node_modules; npm install; }
      - run: npm test
      - name: Publish to npm
        if: vars.AUTO_PUBLISH == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the matching section out of the changelog for the release notes.
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' changelog.md > release-notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping."
          elif [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
