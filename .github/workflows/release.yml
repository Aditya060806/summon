name: Release

# Publishes to npm whenever a version tag (e.g. v1.1.0) is pushed.
#
# One-time setup: add an npm automation token as the repository secret
# NPM_TOKEN (Settings → Secrets and variables → Actions).
#
# Then release with:
#   npm version patch   # bumps package.json and creates the git tag
#   git push --follow-tags

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # enables npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
