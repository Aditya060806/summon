<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="8%" r="70%">
      <stop offset="0%" stop-color="#6ea8ff" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#8b7bff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#05060a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aeb6c4"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#05060a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(600 150)" fill="none" stroke="#6ea8ff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M0 -26 -30 -11 0 4 30 -11 0 -26Z"/>
    <path d="M-30 5 0 20 30 5"/>
    <path d="M-30 20 0 35 30 20" stroke-opacity="0.5"/>
  </g>

  <text x="600" y="360" text-anchor="middle" font-size="160" font-weight="700" letter-spacing="-4" fill="url(#word)">SUMMON</text>
  <text x="600" y="420" text-anchor="middle" font-size="30" font-weight="500" letter-spacing="14" fill="#f3f5f8">OPEN ANYTHING, INSTANTLY.</text>

  <!-- install pill -->
  <g transform="translate(600 490)">
    <rect x="-235" y="-27" width="470" height="54" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="0" y="7" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" fill="#e8ecf2"><tspan fill="#6ea8ff">$ </tspan>npm i -g summon-open</text>
  </g>

  <text x="600" y="585" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" fill="#5b6472">Cross-platform CLI · bookmarks · search · clipboard · reveal · fuzzy picker · by Aditya Pandey</text>
</svg>
